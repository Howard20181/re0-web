# 自动构建（避免编译异常，仅在 staging 分支构建，需手动合并）
name: Automatically Build GitBook
on:
  # 手动触发构建
  workflow_dispatch:

  # 合并触发
  # pull_request:
  #   branches:
  #     - master

  # 提交触发
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    # 当仓库隶属组织时，赋予流水线“写权限”以便提交变更
    permissions:
      contents: write
      
    steps:
      - name: Check out repo
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 2

      - name: Setup Git Infomation
        run: |-
          git config --global user.name "${{ vars._GIT_USER }}"
          git config --global user.email "${{ vars._GIT_MAIL }}"
      - name: Setup Deploy Private Key
        env:
          DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$DEPLOY_PRIVATE_KEY" > ~/.ssh/id_rsa 
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Check if full rebuild is needed
        id: check_rebuild
        run: |
          # 手动触发时强制全量重建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Triggered manually: full rebuild."
            exit 0
          fi
          # 检测关键文件是否变更（结构/配置变更才需全量重建）
          CHANGED=$(git diff HEAD~1 --name-only)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE "^gitbook/(SUMMARY\.md|book\.json|res/)"; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Key files changed: full rebuild triggered."
          else
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "Only content files changed: skipping full rebuild."
          fi

      - name: Compile
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        run: |-
          ./bin/build.sh

      - name: Commit and push Github page (if changed)
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        run: |-
          git add -A
          git commit -m "Updated by Github Bot" || exit 0
          git push origin master

