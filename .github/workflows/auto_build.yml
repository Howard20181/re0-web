# mdBook 自动构建与 GitHub Pages 部署
name: Build mdBook

on:
  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check if rebuild is needed
        id: check_rebuild
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Triggered manually: full rebuild."
            exit 0
          fi
          CHANGED=$(git diff HEAD~1 --name-only)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE "^(mdbook/src/|mdbook/theme/|mdbook/book\.toml|bin/(build-mdbook|adapt-summary|fix-res-paths|gen-sitemap|gen-rss))"; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Key files changed: rebuild triggered."
          else
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "Only content files changed: skipping rebuild."
          fi

      - name: Build mdBook
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        run: ./bin/build-mdbook.sh

      - name: Upload Pages artifact
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: mdbook/book

      - name: Deploy to GitHub Pages
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
