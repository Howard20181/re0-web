# mdBook 自动构建与 GitHub Pages 部署
name: Build mdBook

on:
  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 2

      - name: Setup Git Information
        run: |-
          git config --global user.name "${{ vars._GIT_USER }}"
          git config --global user.email "${{ vars._GIT_MAIL }}"

      - name: Setup Deploy Private Key
        env:
          DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$DEPLOY_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Check if rebuild is needed
        id: check_rebuild
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Triggered manually: full rebuild."
            exit 0
          fi
          CHANGED=$(git diff HEAD~1 --name-only)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE "^(mdbook/src/(SUMMARY\.md|res/|markdown/ch/)|mdbook/book\.toml|bin/(build-mdbook|adapt-summary|fix-res-paths|gen-sitemap|gen-rss))"; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "Key files changed: rebuild triggered."
          else
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "Only content files changed: skipping rebuild."
          fi

      - name: Build mdBook
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        run: ./bin/build-mdbook.sh

      - name: Commit and push (if changed)
        if: steps.check_rebuild.outputs.needs_rebuild == 'true'
        run: |-
          git add -A
          git commit -m "mdBook build by Github Bot" || exit 0
          git push origin master
